<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galli, Santin — f(x) XR Pro</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body, html {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #04080f;
        color: #c8dff8;
        font-family: 'JetBrains Mono', monospace;
      }

      /* ══════════════════════════════════════════
         PANEL 2D
      ══════════════════════════════════════════ */
      #panel {
        position: absolute;
        left: 1.1rem; top: 1.1rem;
        width: 330px;
        z-index: 10;
        border-radius: 16px;
        overflow-y: auto;
        max-height: calc(100vh - 2.2rem);
        background:
          linear-gradient(135deg, rgba(40,120,220,0.08) 0%, rgba(10,30,70,0.0) 60%),
          rgba(5, 11, 26, 0.9);
        border: 1px solid rgba(80, 180, 255, 0.18);
        backdrop-filter: blur(24px) saturate(1.6);
        box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      }

      #panel::before {
        content: ''; display: block; height: 2px;
        background: linear-gradient(90deg, transparent 0%, #3af 18%, #7af 40%, #f6a 65%, transparent 100%);
      }

      .panel-inner { padding: 0.9rem 1rem 1rem; }
      .ph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
      .ph-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.88rem; color: #7dd6ff; letter-spacing: 0.03em; }
      .ph-sub { font-size: 0.62rem; color: rgba(140,190,240,0.45); }
      
      .sec-label { font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(100,160,220,0.45); margin-bottom: 0.42rem; margin-top: 0.72rem; }

      .fx-row { display: flex; align-items: center; gap: 0.38rem; }
      .fx-lbl { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.78rem; color: #fad85a; }
      #fxInput {
        flex: 1; min-width: 0; background: rgba(50,120,220,0.08);
        border: 1px solid rgba(80,160,255,0.22); border-radius: 8px; padding: 0.32rem 0.55rem;
        font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: #e8f4ff; outline: none;
      }
      
      #applyBtn {
        background: linear-gradient(135deg, #3af 0%, #29e 100%); color: #02060f;
        border: none; border-radius: 8px; padding: 0.32rem 0.6rem;
        font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.68rem; cursor: pointer;
      }

      #fxError { font-size: 0.66rem; color: #ff7aac; min-height: 0.85rem; margin-top: 0.28rem; }

      .sr { display: grid; grid-template-columns: 22px 1fr 46px; gap: 0.4rem; align-items: center; margin-bottom: 0.48rem; }
      .sn { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.76rem; text-align: center; }
      .sn.a  { color: #5ae4ff; }
      .sn.b  { color: #ff7aac; }
      .sv { font-size: 0.7rem; text-align: right; color: rgba(180,220,255,0.5); }

      input[type='range'] {
        -webkit-appearance: none; width: 100%; height: 3px; border-radius: 2px; background: rgba(30,70,140,0.6); outline: none;
      }
      #aSlider { background: linear-gradient(90deg, rgba(90,228,255,0.35) var(--pct,50%), rgba(30,70,140,0.5) var(--pct,50%)); }
      #bSlider { background: linear-gradient(90deg, rgba(255,122,172,0.35) var(--pct,50%), rgba(30,70,140,0.5) var(--pct,50%)); }
      input[type='range']::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:#7dd6ff; cursor:pointer; }

      .div { height: 1px; background: linear-gradient(90deg, transparent, rgba(80,160,255,0.15), transparent); margin: 0.65rem 0; }
      .examples { display: flex; flex-wrap: wrap; gap: 0.28rem; margin-top: 0.5rem; }
      .ex-chip {
        font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; padding: 0.18rem 0.45rem;
        background: rgba(50,120,220,0.1); border: 1px solid rgba(80,160,255,0.16); border-radius: 4px; color: rgba(160,210,255,0.55); cursor: pointer;
      }

      /* ── CONTROLLI FOTOCAMERA ED ELEMENTI ── */
      .cam-pad { display: flex; align-items: center; justify-content: center; margin: 0.5rem auto 0; width: 110px; height: 110px; position: relative; }
      .cam-btn {
        position: absolute; background: rgba(50,120,220,0.15); border: 1px solid rgba(80,160,255,0.3);
        color: #7dd6ff; font-size: 0.8rem; width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      .cam-up { top: 0; left: 41px; } .cam-down { bottom: 0; left: 41px; }
      .cam-left { left: 0; top: 41px; } .cam-right { right: 0; top: 41px; }
      .cam-z-in { right: 0; top: 0; font-weight: bold; } .cam-z-out { left: 0; top: 0; font-weight: bold; }
      .cam-center { position: absolute; top: 38px; left: 38px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: rgba(250,216,90,0.1); border: 1px solid rgba(250,216,90,0.3); border-radius: 50%; color: #fad85a; }

      .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.6rem; }
      .act-btn {
        background: rgba(120,180,255,0.1); border: 1px solid rgba(80,160,255,0.25); border-radius: 6px;
        padding: 0.4rem; color: #7dd6ff; font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: bold;
        text-align: center; cursor: pointer; text-transform: uppercase;
      }
      .act-btn.active { background: rgba(250,216,90,0.25); border-color: #fad85a; color: #fff; }

      canvas { display: block; }
    </style>
  </head>
  <body>

    <div id="panel">
      <div class="panel-inner">
        <div class="ph">
          <div class="ph-left"><span class="ph-title">f(x) Explorer XR</span><br><span class="ph-sub">Galli &amp; Santin</span></div>
        </div>

        <div class="sec-label">Formula</div>
        <div class="fx-row">
          <span class="fx-lbl">f(x)=</span>
          <input id="fxInput" type="text" value="2*x - 1/x" />
          <button id="applyBtn">PLOT</button>
        </div>
        <div id="fxError"></div>

        <div class="examples">
          <span class="ex-chip" data-fx="A*sin(B*x)">A·sin(B·x)</span>
          <span class="ex-chip" data-fx="A*x^2 + B">A·x²+B</span>
          <span class="ex-chip" data-fx="sin(A*x)/x">sin(A·x)/x</span>
        </div>

        <div class="div"></div>
        <div class="sec-label">Parametri</div>
        <div class="sr"><span class="sn a">A</span><input type="range" id="aSlider" min="-10" max="10" step="0.1" value="1" /><span class="sv" id="aValue">1.0</span></div>
        <div class="sr"><span class="sn b">B</span><input type="range" id="bSlider" min="-10" max="10" step="0.1" value="1" /><span class="sv" id="bValue">1.0</span></div>

        <div class="div"></div>
        <div class="sec-label" style="text-align: center;">Muovi Visuale (Camera)</div>
        <div class="cam-pad">
          <button class="cam-btn cam-z-out" id="camZOut">−</button>
          <button class="cam-btn cam-up" id="camUp">▲</button>
          <button class="cam-btn cam-z-in" id="camZIn">＋</button>
          <button class="cam-btn cam-left" id="camLeft">◀</button>
          <div class="cam-center">📷</div>
          <button class="cam-btn cam-right" id="camRight">▶</button>
          <button class="cam-btn cam-down" id="camDown">▼</button>
        </div>

        <div class="div"></div>
        <div class="sec-label">Trascinamento Oggetti Spaziali</div>
        <div class="action-grid">
          <button class="act-btn" id="dragMenuBtn">Muovi Menu</button>
          <button class="act-btn" id="dragAxesBtn">Muovi Assi</button>
        </div>
      </div>
    </div>

    <script type="module">
      import * as THREE from './vendor/three/build/three.module.js';
      import { VRButton } from './vendor/three/examples/jsm/webxr/VRButton.js';

      /* ══ RENDERER & SCENE ═════════════════════════════════ */
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x04080f);

      const cameraRig = new THREE.Group();
      scene.add(cameraRig);
      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
      camera.position.set(0, 1.8, 4);
      cameraRig.add(camera);

      scene.add(new THREE.HemisphereLight(0xaaccff, 0x101828, 0.85));
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.75);
      dirLight.position.set(5, 7, 5);
      scene.add(dirLight);

      /* ambient floor */
      const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshStandardMaterial({ color: 0x060e1e, roughness: 0.95 }));
      floor.rotation.x = -Math.PI / 2; scene.add(floor);
      const grid = new THREE.GridHelper(12, 24, 0x162a50, 0x0c1a34); grid.position.y = 0.001; scene.add(grid);

      /* ══ STATE ═════════════════════════════════════════════ */
      let paramA = 1, paramB = 1;
      let fxExpr = '2*x - 1/x';
      let fxCurve = null;
      let activeDragMode = null; // 'menu', 'axes', o null

      const axesGroup = new THREE.Group();
      axesGroup.position.set(0, 1.2, -0.4);
      axesGroup.scale.setScalar(0.7);
      scene.add(axesGroup);

      /* ══ VR CANVAS INTERFACE (512x512) ═════════════════════ */
      let vrUiMesh;
      const vrUiCanvas = document.createElement('canvas'); vrUiCanvas.width = 512; vrUiCanvas.height = 512;
      const vrUiCtx = vrUiCanvas.getContext('2d');
      const vrUiTexture = new THREE.CanvasTexture(vrUiCanvas);

      // Hitboxes mappa del pannello VR
      const hitBoxes = {
        sliderA:  { x: 40, y: 100, w: 432, h: 35, min: -10, max: 10, type: 'slider', key: 'A' },
        sliderB:  { x: 40, y: 180, w: 432, h: 35, min: -10, max: 10, type: 'slider', key: 'B' },
        // Formule Rapide VR
        fChip1:   { x: 40,  y: 240, w: 130, h: 35, type: 'formula', fx: 'A*sin(B*x)' },
        fChip2:   { x: 190, y: 240, w: 130, h: 35, type: 'formula', fx: 'A*x^2 + B' },
        fChip3:   { x: 340, y: 240, w: 130, h: 35, type: 'formula', fx: 'sin(A*x)/x' },
        // Spostamento camera VR
        btnUp:    { x: 236, y: 310, w: 40, h: 32, type: 'btn', action: 'camUp' },
        btnDown:  { x: 236, y: 390, w: 40, h: 32, type: 'btn', action: 'camDown' },
        btnLeft:  { x: 186, y: 350, w: 40, h: 32, type: 'btn', action: 'camLeft' },
        btnRight: { x: 286, y: 350, w: 40, h: 32, type: 'btn', action: 'camRight' },
        btnZIn:   { x: 346, y: 350, w: 40, h: 32, type: 'btn', action: 'camZIn' },
        btnZOut:  { x: 126, y: 350, w: 40, h: 32, type: 'btn', action: 'camZOut' },
        // Tasti di Trascinamento/Modalità in VR
        modeMenu: { x: 50,  y: 450, w: 190, h: 40, type: 'mode', mode: 'menu' },
        modeAxes: { x: 272, y: 450, w: 190, h: 40, type: 'mode', mode: 'axes' }
      };

      function drawVrUi() {
        vrUiCtx.fillStyle = 'rgba(5, 11, 26, 0.96)'; vrUiCtx.fillRect(0, 0, 512, 512);
        vrUiCtx.strokeStyle = 'rgba(80, 180, 255, 0.4)'; vrUiCtx.lineWidth = 4; vrUiCtx.strokeRect(2, 2, 508, 508);

        // Titolo ed espressione corrente
        vrUiCtx.fillStyle = '#7dd6ff'; vrUiCtx.font = 'bold 22px sans-serif';
        vrUiCtx.fillText(`f(x) = ${fxExpr}`, 40, 45);

        // Sliders A e B
        vrUiCtx.fillStyle = '#5ae4ff'; vrUiCtx.font = '16px monospace'; vrUiCtx.fillText(`A: ${paramA.toFixed(1)}`, 40, 88);
        drawCanvasSlider(hitBoxes.sliderA, paramA);
        vrUiCtx.fillStyle = '#ff7aac'; vrUiCtx.fillText(`B: ${paramB.toFixed(1)}`, 40, 168);
        drawCanvasSlider(hitBoxes.sliderB, paramB);

        // Chip formule veloci
        drawCanvasChip(hitBoxes.fChip1, 'A·sin(B·x)');
        drawCanvasChip(hitBoxes.fChip2, 'A·x²+B');
        drawCanvasChip(hitBoxes.fChip3, 'sin(A·x)/x');

        // Pad della camera
        vrUiCtx.fillStyle = 'rgba(200,220,255,0.4)'; vrUiCtx.font = '12px sans-serif'; vrUiCtx.fillText('VISUALE CAMERA (X/Y/Z)', 40, 305);
        drawCanvasBtn(hitBoxes.btnUp, '▲'); drawCanvasBtn(hitBoxes.btnDown, '▼');
        drawCanvasBtn(hitBoxes.btnLeft, '◀'); drawCanvasBtn(hitBoxes.btnRight, '▶');
        drawCanvasBtn(hitBoxes.btnZIn, '＋'); drawCanvasBtn(hitBoxes.btnZOut, '─');
        vrUiCtx.fillStyle = '#fad85a'; vrUiCtx.font = '20px sans-serif'; vrUiCtx.fillText('📷', 244, 374);

        // Pulsanti di Trascinamento
        drawModeBtn(hitBoxes.modeMenu, 'MUOVI MENU', activeDragMode === 'menu');
        drawModeBtn(hitBoxes.modeAxes, 'MUOVI ASSI', activeDragMode === 'axes');

        vrUiTexture.needsUpdate = true;
      }

      function drawCanvasSlider(box, val) {
        vrUiCtx.fillStyle = 'rgba(30,70,140,0.5)'; vrUiCtx.fillRect(box.x, box.y + 15, box.w, 6);
        const pct = (val - box.min) / (box.max - box.min);
        vrUiCtx.fillStyle = '#7dd6ff'; vrUiCtx.fillRect(box.x, box.y + 15, box.w * pct, 6);
        vrUiCtx.fillStyle = '#fff'; vrUiCtx.beginPath(); vrUiCtx.arc(box.x + (box.w * pct), box.y + 18, 9, 0, Math.PI*2); vrUiCtx.fill();
      }

      function drawCanvasChip(box, text) {
        vrUiCtx.fillStyle = 'rgba(80, 160, 255, 0.1)'; vrUiCtx.fillRect(box.x, box.y, box.w, box.h);
        vrUiCtx.strokeStyle = 'rgba(80, 160, 255, 0.3)'; vrUiCtx.strokeRect(box.x, box.y, box.w, box.h);
        vrUiCtx.fillStyle = '#aaccff'; vrUiCtx.font = '14px monospace'; vrUiCtx.fillText(text, box.x + 10, box.y + 22);
      }

      function drawCanvasBtn(box, text) {
        vrUiCtx.fillStyle = 'rgba(80, 160, 255, 0.15)'; vrUiCtx.fillRect(box.x, box.y, box.w, box.h);
        vrUiCtx.strokeStyle = 'rgba(80, 160, 255, 0.4)'; vrUiCtx.strokeRect(box.x, box.y, box.w, box.h);
        vrUiCtx.fillStyle = '#7dd6ff'; vrUiCtx.font = '16px sans-serif'; vrUiCtx.fillText(text, box.x + 12, box.y + 22);
      }

      function drawModeBtn(box, text, isActive) {
        vrUiCtx.fillStyle = isActive ? 'rgba(250, 216, 90, 0.3)' : 'rgba(80, 160, 255, 0.1)';
        vrUiCtx.fillRect(box.x, box.y, box.w, box.h);
        vrUiCtx.strokeStyle = isActive ? '#fad85a' : 'rgba(80, 160, 255, 0.4)';
        vrUiCtx.strokeRect(box.x, box.y, box.w, box.h);
        vrUiCtx.fillStyle = isActive ? '#fff' : '#7dd6ff';
        vrUiCtx.font = 'bold 14px sans-serif'; vrUiCtx.fillText(text, box.x + 40, box.y + 25);
      }

      // Creazione del pannello 3D VR fluttuante
      const vrUiGeo = new THREE.PlaneGeometry(1.3, 1.3);
      const vrUiMat = new THREE.MeshBasicMaterial({ map: vrUiTexture, side: THREE.DoubleSide, transparent: true });
      vrUiMesh = new THREE.Mesh(vrUiGeo, vrUiMat);
      vrUiMesh.position.set(-1.1, 1.4, -0.6); vrUiMesh.rotation.y = 0.35;
      scene.add(vrUiMesh);

      /* ══ SYNC CONTROLLI INTERFACCIA SCHERMO (2D) ═══════════ */
      const aSlider = document.getElementById('aSlider'); const aValue = document.getElementById('aValue');
      const bSlider = document.getElementById('bSlider'); const bValue = document.getElementById('bValue');
      const dragMenuBtn = document.getElementById('dragMenuBtn'); const dragAxesBtn = document.getElementById('dragAxesBtn');

      function syncSliderBg(el) {
        const pct = ((parseFloat(el.value) - parseFloat(el.min)) / (parseFloat(el.max) - parseFloat(el.min)) * 100).toFixed(1) + '%';
        el.style.setProperty('--pct', pct);
      }

      function updateAllViews() {
        aValue.textContent = paramA.toFixed(1); aSlider.value = paramA;
        bValue.textContent = paramB.toFixed(1); bSlider.value = paramB;
        syncSliderBg(aSlider); syncSliderBg(bSlider);
        updateFxCurve();
        drawVrUi();
      }

      aSlider.addEventListener('input', e => { paramA = parseFloat(e.target.value); updateAllViews(); });
      bSlider.addEventListener('input', e => { paramB = parseFloat(e.target.value); updateAllViews(); });

      // Gestione dei tasti di Modalità Drag da desktop
      function toggleDragMode(mode, btnEl) {
        if (activeDragMode === mode) {
          activeDragMode = null; btnEl.classList.remove('active');
        } else {
          activeDragMode = mode;
          dragMenuBtn.classList.remove('active'); dragAxesBtn.classList.remove('active');
          btnEl.classList.add('active');
        }
        drawVrUi();
      }
      dragMenuBtn.addEventListener('click', () => toggleDragMode('menu', dragMenuBtn));
      dragAxesBtn.addEventListener('click', () => toggleDragMode('axes', dragAxesBtn));

      /* Movimenti camera rig */
      const CAM_SPEED = 0.15;
      document.getElementById('camUp').addEventListener('click', () => { cameraRig.position.y += CAM_SPEED; });
      document.getElementById('camDown').addEventListener('click', () => { cameraRig.position.y -= CAM_SPEED; });
      document.getElementById('camLeft').addEventListener('click', () => { cameraRig.position.x -= CAM_SPEED; });
      document.getElementById('camRight').addEventListener('click', () => { cameraRig.position.x += CAM_SPEED; });
      document.getElementById('camZIn').addEventListener('click', () => { cameraRig.position.z -= CAM_SPEED; });
      document.getElementById('camZOut').addEventListener('click', () => { cameraRig.position.z += CAM_SPEED; });

      document.getElementById('applyBtn').addEventListener('click', () => {
        fxExpr = document.getElementById('fxInput').value.trim(); updateAllViews();
      });
      document.querySelectorAll('.ex-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          fxExpr = chip.dataset.fx; document.getElementById('fxInput').value = fxExpr; updateAllViews();
        });
      });

      /* ══ LOGICA FUNZIONE MATEMATICA ════════════════════════ */
      function buildEval(expr) {
        const e = expr.replace(/\^/g, '**').replace(/\bsin\b/g, 'Math.sin').replace(/\bcos\b/g, 'Math.cos').replace(/\btan\b/g, 'Math.tan').replace(/\bpi\b/gi, 'Math.PI');
        return new Function('x', 'A', 'B', `"use strict"; return (${e});`);
      }

      function updateFxCurve() {
        if (fxCurve) { axesGroup.remove(fxCurve); }
        let fn; try { fn = buildEval(fxExpr); } catch(_) { return; }
        const segments = []; let seg = [];
        const start = -Math.PI * 4, end = Math.PI * 4, step = 0.05, SCALE_X = 0.3, SCALE_Y = 0.55;

        for (let t = start; t <= end; t += step) {
          let y = fn(t, paramA, paramB);
          if (!isFinite(y) || Math.abs(y * SCALE_Y) > 5.0) {
            if (seg.length > 1) segments.push(seg); seg = [];
          } else { seg.push(new THREE.Vector3(t * SCALE_X, y * SCALE_Y, 0)); }
        }
        if (seg.length > 1) segments.push(seg);

        fxCurve = new THREE.Group();
        const mat = new THREE.LineBasicMaterial({ color: 0xffdd55, linewidth: 2 });
        segments.forEach(pts => {
          const geo = new THREE.BufferGeometry().setFromPoints(pts);
          fxCurve.add(new THREE.Line(geo, mat));
        });
        axesGroup.add(fxCurve);
      }

      /* ══ GENERAZIONE ASSI CARTESIANI ═══════════════════════ */
      createAxes();
      updateAllViews();

      function createAxes() {
        const length = 3.0, thickness = 0.025;
        const mX = new THREE.MeshStandardMaterial({ color: 0x5ae4ff, emissive: 0x1a5070 });
        const mY = new THREE.MeshStandardMaterial({ color: 0x7affa0, emissive: 0x105030 });
        const mZ = new THREE.MeshStandardMaterial({ color: 0xff7aac, emissive: 0x501030 });

        const xCyl = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), mX); xCyl.rotation.z = -Math.PI/2; xCyl.position.x = length/2; axesGroup.add(xCyl);
        const yCyl = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), mY); yCyl.position.y = length/2; axesGroup.add(yCyl);
        const zCyl = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), mZ); zCyl.rotation.x = Math.PI/2; zCyl.position.z = length/2; axesGroup.add(zCyl);
      }

      /* ══ LOGICA INTERAZIONE CONTROLLER VR ═════════════════ */
      const controllers = [renderer.xr.getController(0), renderer.xr.getController(1)];
      controllers.forEach((c, idx) => {
        scene.add(c);
        c.addEventListener('selectstart', onSelectStart);
        c.addEventListener('selectend', onSelectEnd);
        const ray = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]), new THREE.LineBasicMaterial({ color: 0x5ae4ff }));
        ray.scale.z = 6; c.add(ray);
      });

      const raycaster = new THREE.Raycaster();
      const tempMatrix = new THREE.Matrix4();
      let selectedController = null;
      let activeBox = null;
      let initialObjectOffset = new THREE.Vector3();

      function onSelectStart(event) {
        const controller = event.target;
        tempMatrix.identity().extractRotation(controller.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

        // Se siamo in modalità trascinamento e l'utente seleziona l'oggetto target nello spazio
        if (activeDragMode === 'menu') {
          const hits = raycaster.intersectObject(vrUiMesh);
          if (hits.length > 0) {
            selectedController = controller;
            initialObjectOffset.copy(vrUiMesh.position).sub(hits[0].point);
            return;
          }
        }
        if (activeDragMode === 'axes') {
          const hits = raycaster.intersectObject(axesGroup, true);
          if (hits.length > 0) {
            selectedController = controller;
            initialObjectOffset.copy(axesGroup.position).sub(hits[0].point);
            return;
          }
        }

        // Interazione standard con i pulsanti del canvas VR
        const intersects = raycaster.intersectObject(vrUiMesh);
        if (intersects.length > 0) {
          const uv = intersects[0].uv;
          const cx = uv.x * 512; const cy = (1 - uv.y) * 512;

          for (const key in hitBoxes) {
            const box = hitBoxes[key];
            if (cx >= box.x && cx <= box.x + box.w && cy >= box.y && cy <= box.y + box.h) {
              selectedController = controller; activeBox = box;
              handleVrInteraction(cx); break;
            }
          }
        }
      }

      function onSelectEnd() { selectedController = null; activeBox = null; }

      function handleVrInteraction(canvasX) {
        if (!activeBox) return;

        if (activeBox.type === 'slider') {
          const pct = Math.max(0, Math.min(1, (canvasX - activeBox.x) / activeBox.w));
          const val = activeBox.min + pct * (activeBox.max - activeBox.min);
          if (activeBox.key === 'A') paramA = val;
          if (activeBox.key === 'B') paramB = val;
          updateAllViews();
        } 
        else if (activeBox.type === 'formula') {
          fxExpr = activeBox.fx;
          document.getElementById('fxInput').value = fxExpr;
          updateAllViews();
        }
        else if (activeBox.type === 'mode') {
          activeDragMode = (activeDragMode === activeBox.mode) ? null : activeBox.mode;
          dragMenuBtn.classList.remove('active'); dragAxesBtn.classList.remove('active');
          if (activeDragMode === 'menu') dragMenuBtn.classList.add('active');
          if (activeDragMode === 'axes') dragAxesBtn.classList.add('active');
          drawVrUi();
        }
        else if (activeBox.type === 'btn') {
          if (activeBox.action === 'camUp') cameraRig.position.y += CAM_SPEED;
          if (activeBox.action === 'camDown') cameraRig.position.y -= CAM_SPEED;
          if (activeBox.action === 'camLeft') cameraRig.position.x -= CAM_SPEED;
          if (activeBox.action === 'camRight') cameraRig.position.x += CAM_SPEED;
          if (activeBox.action === 'camZIn') cameraRig.position.z -= CAM_SPEED;
          if (activeBox.action === 'camZOut') cameraRig.position.z += CAM_SPEED;
        }
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      /* ══ LOOP DI RENDERING E TRASCINAMENTO ═════════════════ */
      renderer.setAnimationLoop(() => {
        if (selectedController) {
          tempMatrix.identity().extractRotation(selectedController.matrixWorld);
          raycaster.ray.origin.setFromMatrixPosition(selectedController.matrixWorld);
          raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

          if (activeDragMode === 'menu') {
            // Calcola la posizione della linea di puntamento a distanza fissa per il drag continuo
            const targetPos = new THREE.Vector3().copy(raycaster.ray.origin).addScaledVector(raycaster.ray.direction, 1.5).add(initialObjectOffset);
            vrUiMesh.position.copy(targetPos);
          } 
          else if (activeDragMode === 'axes') {
            const targetPos = new THREE.Vector3().copy(raycaster.ray.origin).addScaledVector(raycaster.ray.direction, 1.8).add(initialObjectOffset);
            axesGroup.position.copy(targetPos);
          } 
          else if (activeBox && activeBox.type === 'slider') {
            const intersects = raycaster.intersectObject(vrUiMesh);
            if (intersects.length > 0) { handleVrInteraction(intersects[0].uv.x * 512); }
          }
        }
        renderer.render(scene, camera);
      });
    </script>
  </body>
</html>
