<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebXR Starter Template</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050a18;
        color: #f4f8ff;
        font-family: system-ui, sans-serif;
      }

      #info {
        position: absolute;
        left: 1.2rem;
        right: 1.2rem;
        top: 1.2rem;
        z-index: 10;
        padding: 1.2rem 1.4rem;
        background: rgba(2, 8, 25, 0.75);
        border: 1px solid rgba(136, 200, 255, 0.12);
        border-radius: 1rem;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        line-height: 1.6;
        font-size: 0.95rem;
        max-width: 480px;
      }

      #info strong {
        display: block;
        margin-bottom: 0.3rem;
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        background: linear-gradient(90deg, #88c8ff, #c4a3ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      #info p {
        margin: 0;
        color: rgba(244, 248, 255, 0.65);
        font-size: 0.88rem;
        line-height: 1.6;
      }

      #info .hint {
        margin-top: 0.75rem;
        padding: 0.6rem 0.8rem;
        background: rgba(136, 200, 255, 0.06);
        border: 1px solid rgba(136, 200, 255, 0.1);
        border-radius: 0.5rem;
        font-family: monospace;
        font-size: 0.75rem;
        color: rgba(244, 248, 255, 0.45);
        line-height: 1.7;
      }

      #info .hint span {
        color: #88c8ff;
        font-weight: 700;
      }

      /* Exit VR button */
      #exitVRBtn {
        position: absolute;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        display: none;
        padding: 0.65rem 1.6rem;
        background: rgba(2, 8, 25, 0.85);
        border: 1px solid rgba(255, 100, 100, 0.35);
        border-radius: 2rem;
        color: #ff8888;
        font-family: system-ui, sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: background 0.2s, border-color 0.2s, color 0.2s;
      }

      #exitVRBtn:hover {
        background: rgba(255, 80, 80, 0.15);
        border-color: rgba(255, 100, 100, 0.7);
        color: #ffaaaa;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <strong>WebXR Starter Template</strong>
      <p>This is a WebXR template to start building your immersive dreams.</p>
      <div class="hint">
        <span>L stick</span> — move camera · <span>R stick</span> — look around<br>
        <span>Trigger</span> — interact · <span>Exit VR</span> — leave session
      </div>
    </div>

    <button id="exitVRBtn">✕ Exit VR</button>

    <script type="module">
      import * as THREE from '../vendor/three/build/three.module.js';
      import { VRButton } from '../vendor/three/examples/jsm/webxr/VRButton.js';

      // ─── Renderer ────────────────────────────────────────────────────────────
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      // ─── Exit VR button ──────────────────────────────────────────────────────
      const exitVRBtn = document.getElementById('exitVRBtn');
      exitVRBtn.addEventListener('click', () => {
        if (renderer.xr.isPresenting) {
          renderer.xr.getSession().end();
        }
      });

      renderer.xr.addEventListener('sessionstart', () => {
        exitVRBtn.style.display = 'block';
      });
      renderer.xr.addEventListener('sessionend', () => {
        exitVRBtn.style.display = 'none';
      });

      // ─── Scene ───────────────────────────────────────────────────────────────
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050a18);
      scene.fog = new THREE.FogExp2(0x050a18, 0.045);

      // ─── Camera rig ──────────────────────────────────────────────────────────
      // In WebXR the camera is controlled by the HMD pose within the XR session.
      // To allow locomotion we place the camera (and session) inside a rig group.
      const cameraRig = new THREE.Group();
      scene.add(cameraRig);

      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 200);
      camera.position.set(0, 1.6, 4);
      cameraRig.add(camera);

      // Controllers are children of the rig so they move with it
      const controller0 = renderer.xr.getController(0);
      const controller1 = renderer.xr.getController(1);
      cameraRig.add(controller0);
      cameraRig.add(controller1);

      // ─── Lights ──────────────────────────────────────────────────────────────
      scene.add(new THREE.HemisphereLight(0xffffff, 0x101825, 0.8));
      const sun = new THREE.DirectionalLight(0xffffff, 0.9);
      sun.position.set(5, 10, 5);
      scene.add(sun);

      // ─── Environment ─────────────────────────────────────────────────────────
      // Floor
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(40, 40),
        new THREE.MeshStandardMaterial({ color: 0x081025, roughness: 0.95, metalness: 0.05 })
      );
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);

      // Grid
      const grid = new THREE.GridHelper(40, 40, 0x1a3a5c, 0x0d1e35);
      grid.position.y = 0.001;
      scene.add(grid);

      // Decorative floating orbs
      const orbColors = [0x88c8ff, 0xc4a3ff, 0x68e8b0, 0xffd568];
      for (let i = 0; i < 12; i++) {
        const r = 0.08 + Math.random() * 0.18;
        const orb = new THREE.Mesh(
          new THREE.SphereGeometry(r, 20, 16),
          new THREE.MeshStandardMaterial({
            color: orbColors[i % orbColors.length],
            roughness: 0.15,
            metalness: 0.8,
            emissive: orbColors[i % orbColors.length],
            emissiveIntensity: 0.25
          })
        );
        orb.position.set(
          (Math.random() - 0.5) * 14,
          1 + Math.random() * 3,
          (Math.random() - 0.5) * 14
        );
        orb.userData.floatOffset = Math.random() * Math.PI * 2;
        orb.userData.floatSpeed = 0.3 + Math.random() * 0.5;
        scene.add(orb);
      }

      // Collect orbs for animation
      const orbs = scene.children.filter(c => c.userData.floatOffset !== undefined);

      // ─── Controller ray visuals ───────────────────────────────────────────────
      function buildControllerRay(controller) {
        // Ray line
        const rayGeom = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(0, 0, -1)
        ]);
        const ray = new THREE.Line(
          rayGeom,
          new THREE.LineBasicMaterial({ color: 0x88c8ff, opacity: 0.65, transparent: true })
        );
        ray.name = 'ray';
        ray.scale.z = 10;
        controller.add(ray);

        // Dot at ray tip
        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(0.012, 12, 10),
          new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.8, transparent: true })
        );
        dot.position.set(0, 0, -1);
        dot.name = 'rayDot';
        controller.add(dot);

        // Controller body
        const body = new THREE.Mesh(
          new THREE.CylinderGeometry(0.018, 0.028, 0.14, 16),
          new THREE.MeshStandardMaterial({ color: 0x1a3a5c, roughness: 0.4, metalness: 0.7 })
        );
        body.rotation.x = Math.PI / 2;
        controller.add(body);
      }

      buildControllerRay(controller0);
      buildControllerRay(controller1);

      // ─── Gamepad / locomotion ─────────────────────────────────────────────────
      // Movement params
      const MOVE_SPEED = 2.5;   // m/s
      const LOOK_SPEED = 1.8;   // rad/s
      const DEADZONE   = 0.18;

      // Accumulated yaw for right-stick look (desktop fallback via keyboard also possible)
      let yaw = 0;

      function getGamepads() {
        // XR gamepad sources
        const session = renderer.xr.getSession();
        if (!session) return [null, null];
        const sources = Array.from(session.inputSources);
        // handedness order: 0=left, 1=right (may vary by device)
        const left  = sources.find(s => s.handedness === 'left')  || sources[0] || null;
        const right = sources.find(s => s.handedness === 'right') || sources[1] || null;
        return [left, right];
      }

      function applyDeadzone(v) {
        return Math.abs(v) < DEADZONE ? 0 : v;
      }

      // ─── Resize ──────────────────────────────────────────────────────────────
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ─── Render loop ─────────────────────────────────────────────────────────
      const clock = new THREE.Clock();
      const _forward = new THREE.Vector3();
      const _right3  = new THREE.Vector3();
      const _up3     = new THREE.Vector3();

      renderer.setAnimationLoop(() => {
        const dt = clock.getDelta();
        const t  = clock.elapsedTime;

        // Float orbs
        orbs.forEach(orb => {
          orb.position.y += Math.sin(t * orb.userData.floatSpeed + orb.userData.floatOffset) * 0.003;
        });

        // ── Locomotion ────────────────────────────────────────────────────────
        const [leftSrc, rightSrc] = getGamepads();

        // Right stick → yaw (horizontal look) + pitch (vertical look)
        if (rightSrc && rightSrc.gamepad) {
          const ax = rightSrc.gamepad.axes;
          // axes[2] = right-stick X, axes[3] = right-stick Y (standard mapping)
          const rx = applyDeadzone(ax[2] ?? 0);
          const ry = applyDeadzone(ax[3] ?? 0);

          if (rx !== 0) {
            yaw -= rx * LOOK_SPEED * dt;
            cameraRig.rotation.y = yaw;
          }

          // Vertical look: tilt camera pitch within the rig
          if (ry !== 0) {
            camera.rotation.x = THREE.MathUtils.clamp(
              camera.rotation.x - ry * LOOK_SPEED * dt,
              -Math.PI / 2.2,
              Math.PI / 2.2
            );
          }
        }

        // Left stick → strafe (X) + move forward/back (Y), relative to rig yaw
        if (leftSrc && leftSrc.gamepad) {
          const ax = leftSrc.gamepad.axes;
          const lx = applyDeadzone(ax[0] ?? 0);
          const ly = applyDeadzone(ax[1] ?? 0);

          if (lx !== 0 || ly !== 0) {
            // Forward direction based on current rig yaw
            _forward.set(Math.sin(yaw), 0, Math.cos(yaw));
            _right3.set(Math.cos(yaw), 0, -Math.sin(yaw));

            cameraRig.position.addScaledVector(_right3,   lx * MOVE_SPEED * dt);
            cameraRig.position.addScaledVector(_forward, -ly * MOVE_SPEED * dt);
          }

          // Up/down: axes[3] if left stick has it — some controllers use trigger buttons instead
          // We use left-stick vertical for forward/back (standard FPS). Up/down optional via button.
        }

        renderer.render(scene, camera);
      });
    </script>
  </body>
</html>
